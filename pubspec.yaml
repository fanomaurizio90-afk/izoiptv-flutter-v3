name: izo_iptv
description: IZO IPTV Player
publish_to: none
version: 3.15.3+59

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  media_kit: ^1.1.10
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.4
  sqflite: ^2.3.3+1
  path: ^1.9.0
  cached_network_image: ^3.3.1
  dio: ^5.4.3+1
  flutter_secure_storage: ^9.2.2
  device_info_plus: ^10.1.0
  collection: ^1.18.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  video_player: ^2.9.2
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
